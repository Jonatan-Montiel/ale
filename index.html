<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Te Quiero Mucho 💕</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      min-height: 100vh;
      min-height: 100dvh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(135deg,
        #ffe0f0 0%, #ffb3d4 20%, #ff80b5 40%,
        #ff4da6 60%, #e6005c 80%, #cc0052 100%
      );
      background-size: 400% 400%;
      animation: gradientShift 8s ease infinite;
      overflow: hidden;
      font-family: 'Playfair Display', serif;
      touch-action: none;
    }

    @keyframes gradientShift {
      0%   { background-position: 0% 50%; }
      50%  { background-position: 100% 50%; }
      100% { background-position: 0% 50%; }
    }

    /* Corazones flotantes */
    .hearts-bg {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 0;
    }
    .heart {
      position: absolute;
      bottom: -60px;
      opacity: 0;
      animation: floatUp linear infinite;
    }
    @keyframes floatUp {
      0%   { transform: translateY(0) rotate(-10deg) scale(0.8); opacity: 0; }
      10%  { opacity: 0.7; }
      90%  { opacity: 0.4; }
      100% { transform: translateY(-110vh) rotate(10deg) scale(1.2); opacity: 0; }
    }

    /* Centro */
    .center {
      position: relative;
      z-index: 1;
      text-align: center;
      padding: 2rem;
      width: 100%;
    }

    /* Texto principal */
    .main-text {
      font-size: clamp(3rem, 14vw, 9rem);
      font-weight: 700;
      color: #fff;
      text-shadow:
        0 0 20px rgba(255,255,255,0.8),
        0 0 60px rgba(255,100,180,0.7),
        0 4px 30px rgba(180,0,80,0.5);
      letter-spacing: 0.03em;
      animation: breathe 2.2s ease-in-out infinite;
      line-height: 1.1;
      display: block;
    }

    @keyframes breathe {
      0%   { transform: scale(1);    text-shadow: 0 0 20px rgba(255,255,255,0.8), 0 0 60px rgba(255,100,180,0.7), 0 4px 30px rgba(180,0,80,0.5); }
      50%  { transform: scale(1.12); text-shadow: 0 0 40px rgba(255,255,255,1), 0 0 100px rgba(255,150,200,0.9), 0 8px 50px rgba(200,0,100,0.7); }
      100% { transform: scale(1);    text-shadow: 0 0 20px rgba(255,255,255,0.8), 0 0 60px rgba(255,100,180,0.7), 0 4px 30px rgba(180,0,80,0.5); }
    }

    #mainTexts { display: none; }

    @keyframes fadeInScale {
      0%   { opacity: 0; transform: scale(0.6); }
      100% { opacity: 1; transform: scale(1); }
    }
    #mainTexts.visible {
      display: block;
      animation: fadeInScale 0.7s cubic-bezier(0.34,1.56,0.64,1) forwards;
    }

    /* Pregunta */
    #questionText {
      font-size: clamp(1.1rem, 4.5vw, 1.6rem);
      color: #fff;
      font-style: italic;
      text-shadow: 0 2px 15px rgba(180,0,80,0.4);
      margin-bottom: 1.8rem;
      padding: 0 1rem;
      line-height: 1.4;
    }

    #btnWrapper {
      display: flex;
      gap: 1.5rem;
      justify-content: center;
      align-items: center;
    }

    #btnSi, #btnNo {
      font-family: 'Playfair Display', serif;
      font-size: clamp(1rem, 4vw, 1.2rem);
      padding: 0.8rem 2.2rem;
      border: none;
      border-radius: 50px;
      font-weight: 700;
      cursor: pointer;
      box-shadow: 0 4px 20px rgba(0,0,0,0.2);
      -webkit-tap-highlight-color: transparent;
      touch-action: none;
    }

    #btnSi {
      background: #fff;
      color: #e6005c;
      transition: transform 0.15s;
    }
    #btnSi:active { transform: scale(0.95); }

    #btnNo {
      background: rgba(255,255,255,0.25);
      color: #fff;
    }

    /* Cuando escapa: posición fija */
    #btnNo.escaped {
      position: fixed;
      z-index: 10;
      touch-action: none;
    }
  </style>
</head>
<body>

  <div class="hearts-bg" id="heartsContainer"></div>

  <div class="center">

    <div id="mainTexts">
      <span class="main-text" style="font-size: clamp(1.5rem, 6vw, 4rem); margin-bottom: 0.5rem;">Lo sabía, solo quería confirmarlo 😏</span>
      <span class="main-text">Te quiero</span>
      <span class="main-text">mucho Ale 💕</span>
    </div>

    <div id="questionSection">
      <p id="questionText">¿Quieres seguir siendo mi novia?</p>
      <div id="btnWrapper">
        <button id="btnNo">No</button>
        <button id="btnSi" onclick="handleSi()">Sí 💖</button>
      </div>
    </div>

  </div>

  <script>
    // --- Corazones flotantes ---
    const heartsContainer = document.getElementById('heartsContainer');
    const emojis = ['💕','💖','💗','💓','💞','💝','🌸','✨','💫'];
    for (let i = 0; i < 22; i++) {
      const el = document.createElement('span');
      el.classList.add('heart');
      el.textContent = emojis[Math.floor(Math.random() * emojis.length)];
      el.style.left = Math.random() * 100 + 'vw';
      el.style.fontSize = (1 + Math.random() * 1.8) + 'rem';
      const dur = 6 + Math.random() * 8;
      const delay = Math.random() * 10;
      el.style.animation = `floatUp ${dur}s ${delay}s linear infinite`;
      heartsContainer.appendChild(el);
    }

    // --- Botón No ---
    const btnNo = document.getElementById('btnNo');
    let hasEscaped = false;

    function getRandomPosition(touchX, touchY) {
      const margin = 20;
      const bw = btnNo.offsetWidth  || 110;
      const bh = btnNo.offsetHeight || 48;
      const maxX = window.innerWidth  - bw - margin;
      const maxY = window.innerHeight - bh - margin;

      // Intentar hasta 8 veces encontrar una posición lejos del toque
      for (let i = 0; i < 8; i++) {
        const x = Math.floor(Math.random() * maxX + margin);
        const y = Math.floor(Math.random() * maxY + margin);
        // Si hay coordenadas de toque, asegurarse que esté lejos
        if (touchX !== undefined) {
          const dist = Math.hypot(x - touchX, y - touchY);
          if (dist < 120) continue; // muy cerca, reintentar
        }
        return { x, y };
      }
      // Fallback: esquina opuesta
      const cx = (touchX || window.innerWidth / 2) < window.innerWidth / 2;
      return {
        x: cx ? window.innerWidth - bw - margin : margin,
        y: (touchY || window.innerHeight / 2) < window.innerHeight / 2
           ? window.innerHeight - bh - margin : margin
      };
    }

    function escapeNo(touchX, touchY) {
      if (!hasEscaped) {
        const rect = btnNo.getBoundingClientRect();
        btnNo.classList.add('escaped');
        btnNo.style.left = rect.left + 'px';
        btnNo.style.top  = rect.top  + 'px';
        hasEscaped = true;
        // Forzar reflow antes de mover
        btnNo.getBoundingClientRect();
      }
      const pos = getRandomPosition(touchX, touchY);
      btnNo.style.left = pos.x + 'px';
      btnNo.style.top  = pos.y + 'px';
    }

    // Hover (escritorio)
    btnNo.addEventListener('mouseenter', () => escapeNo());

    // Touch (móvil) — preventDefault evita que el toque se convierta en clic
    btnNo.addEventListener('touchstart', (e) => {
      e.preventDefault();
      const touch = e.touches[0];
      escapeNo(touch.clientX, touch.clientY);
    }, { passive: false });

    // Por si acaso llega un clic (no debería): cancelarlo
    btnNo.addEventListener('click', (e) => e.preventDefault());

    // --- Clic en Sí ---
    function handleSi() {
      document.getElementById('questionSection').style.display = 'none';
      btnNo.style.display = 'none';
      document.getElementById('mainTexts').classList.add('visible');
    }
  </script>
</body>
</html>
